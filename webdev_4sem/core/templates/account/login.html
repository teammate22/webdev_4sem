{% extends "base/base.html" %}
{% load socialaccount %}

{% block title %}
Вход | Ridee
{% endblock %}

{% block content %}
<section class="max-w-md mx-auto">
    <div class="glass-panel rounded-3xl p-8 shadow-card">
        <div class="mb-8">
            <p class="text-sm font-semibold text-brand mb-2">Авторизация</p>
            <h2 class="font-display text-3xl font-bold text-white">
                Вход в Ridee
            </h2>
            <p class="text-gray-400 mt-3">
                Используйте Google-аккаунт для входа в проект.
            </p>
        </div>

        <form method="post" action="{% provider_login_url 'google' process='login' %}">
            {% csrf_token %}
            <button type="submit"
                    class="w-full inline-flex items-center justify-center gap-3 px-5 py-3 rounded-xl bg-brand text-dark-950 font-bold hover:bg-brand-hover transition">
                <i data-lucide="log-in" class="w-5 h-5" aria-hidden="true"></i>
                <span>Войти через Google</span>
            </button>
        </form>
    </div>
</section>
{% endblock %}
